<title>OpenRoad — Nakladnoy Tizimi</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const cfg = {
  apiKey:"AIzaSyDfAA1hVFB3Q9SOToU2H4T5WcHsupwXlTs",
  authDomain:"openroad-2efbb.firebaseapp.com",
  projectId:"openroad-2efbb",
  storageBucket:"openroad-2efbb.firebasestorage.app",
  messagingSenderId:"787481988846",
  appId:"1:787481988846:web:f2535bc818377ba9aeadff"
};
const app = initializeApp(cfg);
const db = getFirestore(app);
let cf = "";
function listen() {
  const q = query(collection(db,"nakladnoylar"), orderBy("sana","desc"));
  onSnapshot(q, snap => {
    window._e = [];
    snap.forEach(d => window._e.push({id:d.id,...d.data()}));
    stats(); dlist();
    rtbl(cf ? window._e.filter(e=>JSON.stringify(e).toLowerCase().includes(cf)) : window._e);
    rdrvs();
    document.getElementById("loader").style.display="none";
  }, ()=>{ document.getElementById("loader").style.display="none"; });
}
window._startApp = function() {
  document.getElementById("loader").style.display="flex";
  listen();
  document.getElementById("f_sana").value = new Date().toISOString().split("T")[0];
  document.getElementById("hdate").textContent = new Date().toLocaleDateString("uz-UZ",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
};
window._addE = async function() {
  const n=v("f_nakl"),s=v("f_sana"),sh=v("f_shofyor"),m=v("f_mashina"),x=v("f_xoma");
  const t=parseFloat(v("f_tonna"))||0,r=parseInt(v("f_reys"))||1,narx=parseFloat(v("f_narx"))||0;
  const j=v("f_joy"),iz=v("f_izoh");
  if(!n||!s||!sh||!m||!x||!t){tst("Majburiy maydonlarni toldiring","warn");return;}
  ld(1);
  try{
    await addDoc(collection(db,"nakladnoylar"),{nakl:n,sana:s,shofyor:sh,mashina:m,xoma:x,tonna:t,reys:r,narx:narx,summa:t*r*narx,joy:j,izoh:iz,tolandi:false,tolanganSana:"",rasmB64:"",ts:new Date().toISOString()});
    tst("Nakladnoy saqlandi","ok"); clr();
  }catch(e){tst("Xatolik: "+e.message,"err");}
  ld(0);
};
window._del = async function(id) {
  if(!confirm("Ochirasizmi?"))return;
  ld(1);
  try{await deleteDoc(doc(db,"nakladnoylar",id));tst("Ochirildi","ok");}catch(e){tst("Xatolik","err");}
  ld(0);
};
window._pay = async function(id) {
  const e=window._e.find(x=>x.id===id);if(!e)return;
  const nv=!e.tolandi;
  try{await updateDoc(doc(db,"nakladnoylar",id),{tolandi:nv,tolanganSana:nv?new Date().toISOString().split("T")[0]:""});tst(nv?"Tolandi":"Tolanmagan","ok");}
  catch(e){tst("Xatolik","err");}
};
window._saveRasm = async function(id,b64) {
  ld(1);
  try{await updateDoc(doc(db,"nakladnoylar",id),{rasmB64:b64});tst("Rasm saqlandi","ok");}
  catch(e){tst("Rasm saqlanmadi","err");}
  ld(0);
};
window._csv = function() {
  const h=["Nakl","Sana","Shofyor","Mashina","Xomashyo","Tonna","Reys","Narx","Summa","Joy","Tolandi","Izoh"];
  const r=window._e.map(e=>[e.nakl,e.sana,e.shofyor,e.mashina,e.xoma,e.tonna,e.reys,e.narx,e.summa,e.joy,e.tolandi?"Ha":"Yoq",e.izoh]);
  const csv=[h,...r].map(x=>x.join(",")).join("\n");
  const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,\uFEFF"+encodeURIComponent(csv);a.download="openroad.csv";a.click();
};
<\/script>

.lb{position:relative;z-index:1;background:rgba(15,15,15,.97);border:1px solid var(--a2);border-top:2px solid var(--au);border-radius:16px;padding:40px 36px;width:100%;max-width:380px;display:flex;flex-direction:column;align-items:center;gap:18px;box-shadow:0 0 60px rgba(201,168,76,.1);}
.ll{width:90px;height:90px;object-fit:contain;filter:drop-shadow(0 0 14px rgba(201,168,76,.35));}
.lbr{font-family:var(--sf);font-size:24px;font-weight:700;color:var(--au);letter-spacing:5px;}
.ltg{font-family:var(--mn);font-size:10px;color:var(--mt);letter-spacing:2px;text-transform:uppercase;border-top:1px solid var(--b);border-bottom:1px solid var(--b);padding:7px 0;width:100%;text-align:center;}
.lf{display:flex;flex-direction:column;gap:12px;width:100%;}
.lg{display:flex;flex-direction:column;gap:5px;}
.lg label{font-size:10px;color:var(--a2);text-transform:uppercase;letter-spacing:1px;font-family:var(--mn);}
.lg input{background:rgba(255,255,255,.03);border:1px solid var(--b);color:var(--tx);font-family:var(--mn);font-size:14px;padding:10px 13px;border-radius:7px;outline:none;width:100%;}
.lg input:focus{border-color:var(--au);}
.lbtn{background:linear-gradient(135deg,var(--au),var(--a2));color:#000;border:none;font-family:var(--sf);font-size:16px;font-weight:700;letter-spacing:3px;padding:12px;border-radius:7px;cursor:pointer;width:100%;text-transform:uppercase;}
.le{font-family:var(--mn);font-size:12px;color:var(--rd);text-align:center;display:none;}
#ap{display:none;position:relative;z-index:1;}
header{background:rgba(8,8,8,.96);border-bottom:1px solid var(--a2);padding:0 20px;display:flex;align-items:center;gap:12px;height:58px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);}
.hl{display:flex;align-items:center;gap:9px;}
.hli{width:32px;height:32px;object-fit:contain;filter:drop-shadow(0 0 5px rgba(201,168,76,.4));}
.hd{width:1px;height:20px;background:var(--a2);}
.ht{font-family:var(--sf);font-size:17px;font-weight:700;color:var(--au);letter-spacing:3px;}
.hs{font-family:var(--mn);font-size:9px;color:var(--mt);}
.ob{display:flex;align-items:center;gap:5px;font-family:var(--mn);font-size:10px;color:var(--gr);background:rgba(63,185,80,.07);border:1px solid rgba(63,185,80,.2);padding:3px 9px;border-radius:20px;}
.od{width:6px;height:6px;background:var(--gr);border-radius:50%;animation:pu 2s infinite;}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.db{font-family:var(--mn);font-size:11px;color:var(--mt);}
.lo{margin-left:auto;background:transparent;border:1px solid var(--b);color:var(--mt);font-family:var(--mn);font-size:11px;padding:5px 11px;border-radius:4px;cursor:pointer;}
.lo:hover{color:var(--rd);border-color:var(--rd);}
.sb{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--b);border-bottom:1px solid var(--b);}
.st{background:rgba(8,8,8,.97);padding:13px 18px;text-align:center;}
.sv{font-family:var(--sf);font-size:22px;font-weight:700;color:var(--au);}
.sl{font-size:10px;color:var(--mt);margin-top:2px;text-transform:uppercase;letter-spacing:.8px;font-family:var(--mn);}
main{padding:22px;max-width:1600px;margin:0 auto;}
.tabs{display:flex;margin-bottom:20px;border-bottom:1px solid var(--b);}
.tb{font-family:var(--mn);font-size:12px;padding:9px 20px;border:none;background:transparent;color:var(--mt);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
.tb.ac{color:var(--au);border-bottom-color:var(--au);}
.tp{display:none;}.tp.ac{display:block;}
.fp{background:rgba(14,14,14,.97);border:1px solid var(--b);border-top:2px solid var(--a2);border-radius:10px;padding:24px;margin-bottom:18px;}
.ft{font-family:var(--sf);font-size:17px;color:var(--au);margin-bottom:20px;display:flex;align-items:center;gap:9px;}
.ft::before{content:"";display:inline-block;width:6px;height:6px;background:var(--au);border-radius:50%;}
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:13px;}
.fgp{display:flex;flex-direction:column;gap:5px;}
.fgp label{font-size:10px;color:var(--a2);text-transform:uppercase;letter-spacing:.8px;font-family:var(--mn);}
.fgp input,.fgp select{background:rgba(255,255,255,.02);border:1px solid var(--b);color:var(--tx);font-family:var(--mn);font-size:13px;padding:8px 10px;border-radius:5px;outline:none;width:100%;}
.fgp input:focus,.fgp select:focus{border-color:var(--au);}
.fgp select option{background:#111;}
.fa{margin-top:16px;display:flex;gap:9px;}
.bp{background:linear-gradient(135deg,var(--au),var(--a2));color:#000;border:none;font-family:var(--mn);font-size:12px;font-weight:700;padding:9px 24px;border-radius:5px;cursor:pointer;}
.bs{background:transparent;color:var(--mt);border:1px solid var(--b);font-family:var(--mn);font-size:12px;padding:9px 20px;border-radius:5px;cursor:pointer;}
.tw{background:rgba(14,14,14,.97);border:1px solid var(--b);border-radius:10px;overflow:hidden;}
.th{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b);gap:9px;flex-wrap:wrap;}
.tt{font-family:var(--sf);font-size:15px;color:var(--au);}
.sc{background:rgba(255,255,255,.02);border:1px solid var(--b);color:var(--tx);font-family:var(--mn);font-size:12px;padding:6px 11px;border-radius:5px;outline:none;width:190px;}
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{background:rgba(5,5,5,.9);color:var(--a2);font-family:var(--mn);font-size:10px;text-transform:uppercase;padding:9px 11px;text-align:left;border-bottom:1px solid var(--b);white-space:nowrap;}
.tbl td{padding:9px 11px;border-bottom:1px solid rgba(37,37,37,.5);font-family:var(--mn);vertical-align:middle;}
.rt{width:36px;height:36px;object-fit:cover;border-radius:4px;border:1px solid var(--a2);cursor:pointer;}
.ub{display:inline-flex;align-items:center;background:rgba(201,168,76,.08);border:1px solid var(--a2);color:var(--au);font-family:var(--mn);font-size:10px;padding:3px 9px;border-radius:4px;cursor:pointer;}
.ba{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;font-family:var(--mn);cursor:pointer;}
.bg{background:rgba(63,185,80,.1);color:var(--gr);border:1px solid rgba(63,185,80,.2);}
.br{background:rgba(248,81,73,.1);color:var(--rd);border:1px solid rgba(248,81,73,.2);}
.db2{background:transparent;border:1px solid var(--b);color:var(--rd);font-family:var(--mn);font-size:11px;padding:3px 9px;border-radius:4px;cursor:pointer;}
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:13px;}
.dc{background:rgba(14,14,14,.97);border:1px solid var(--b);border-left:3px solid var(--a2);border-radius:10px;padding:17px;}
.dn{font-family:var(--sf);font-size:16px;font-weight:700;color:var(--tx);margin-bottom:4px;}
.dp{font-family:var(--mn);font-size:12px;color:var(--au);background:rgba(201,168,76,.07);display:inline-block;padding:2px 9px;border-radius:3px;margin-bottom:11px;border:1px solid var(--a2);}
.ds{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.di{text-align:center;background:rgba(255,255,255,.015);border-radius:5px;padding:7px;}
.dv{font-family:var(--sf);font-size:17px;font-weight:700;color:var(--au);}
.dl{font-size:9px;color:var(--mt);margin-top:2px;font-family:var(--mn);text-transform:uppercase;}
.ps{margin-top:11px;padding-top:11px;border-top:1px solid var(--b);}
.em{text-align:center;padding:50px;color:var(--mt);font-family:var(--mn);font-size:13px;}
.pb{display:flex;justify-content:flex-end;gap:9px;margin-bottom:13px;}
#rm{position:fixed;inset:0;z-index:9000;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.94);}
.mi{position:relative;width:100%;max-width:460px;background:var(--s);border:1px solid var(--a2);border-radius:16px;overflow:hidden;margin:14px;}
.mh{padding:13px 17px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b);}
.mt2{font-family:var(--sf);font-size:15px;color:var(--au);}
.mc{background:none;border:none;color:var(--mt);font-size:20px;cursor:pointer;}
.ca{padding:18px;display:flex;flex-direction:column;align-items:center;gap:13px;}
.pi{width:100%;max-height:300px;object-fit:contain;border-radius:8px;display:none;border:1px solid var(--a2);}
.cp{width:100%;height:160px;border:2px dashed var(--a2);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;color:var(--mt);cursor:pointer;}
.ci{font-size:38px;}
.ct{font-family:var(--mn);font-size:11px;text-align:center;}
.ma{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:0 18px 18px;}
.mc2{background:linear-gradient(135deg,var(--au),var(--a2));color:#000;border:none;font-family:var(--mn);font-size:12px;font-weight:700;padding:11px;border-radius:7px;cursor:pointer;}
.mg{background:rgba(255,255,255,.04);color:var(--tx);border:1px solid var(--b);font-family:var(--mn);font-size:12px;padding:11px;border-radius:7px;cursor:pointer;}
.ms{display:none;background:linear-gradient(135deg,var(--au),var(--a2));color:#000;border:none;font-family:var(--mn);font-size:12px;font-weight:700;padding:11px;border-radius:7px;cursor:pointer;width:calc(100% - 36px);margin:0 18px 18px;}
.ms.sh{display:block;}
#vm{position:fixed;inset:0;z-index:9500;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.96);flex-direction:column;gap:14px;}
.vi{max-width:90vw;max-height:80vh;object-fit:contain;border-radius:8px;}
.va{display:flex;gap:11px;}
.vc{background:rgba(0,0,0,.5);border:1px solid var(--a2);color:var(--au);font-family:var(--mn);font-size:12px;padding:8px 18px;border-radius:5px;cursor:pointer;}
.vd{background:linear-gradient(135deg,var(--au),var(--a2));color:#000;border:none;font-family:var(--mn);font-size:12px;font-weight:700;padding:8px 18px;border-radius:5px;text-decoration:none;}
#toast{position:fixed;bottom:22px;right:22px;font-family:var(--mn);font-size:13px;font-weight:700;padding:11px 18px;border-radius:8px;transform:translateY(80px);opacity:0;transition:all .3s;z-index:9999;}
#toast.sh{transform:translateY(0);opacity:1;}
#toast.ok{background:linear-gradient(135deg,var(--au),var(--a2));color:#000;}
#toast.warn{background:#e6a817;color:#000;}
#toast.err{background:var(--rd);color:#fff;}
@media(max-width:600px){.sb{grid-template-columns:repeat(2,1fr);}.fg{grid-template-columns:1fr;}.db{display:none;}.lb{padding:26px 16px;margin:13px;}}
@media print{#ls,header,.tabs,.fp,.pb,.db2,#loader,#toast,#rm,#vm{display:none!important;}body{background:white;color:black;}.tbl th{background:#f0f0f0;color:#333;}.tbl td{color:#000;}}
</style>
</head>

  </header>
  <div class="sb">
    <div class="st"><div class="sv" id="s1">0</div><div class="sl">Nakladnoy</div></div>
    <div class="st"><div class="sv" id="s2">0</div><div class="sl">Tonna</div></div>
    <div class="st"><div class="sv" id="s3">0</div><div class="sl">Reys</div></div>
    <div class="st"><div class="sv" id="s4">0</div><div class="sl">Summa</div></div>

  <main>
    <div class="tabs">

    <div class="tp ac" id="tp1">

          <div class="fgp"><label>Sana *</label><input type="date" id="f_sana"></div>
          <div class="fgp"><label>Shofyor F.I.O. *</label><input type="text" id="f_shofyor" placeholder="Karimov Akbar" list="dl"><datalist id="dl"></datalist></div>
          <div class="fgp"><label>Mashina Raqami *</label><input type="text" id="f_mashina" placeholder="01 A 123 BC"></div>
          <div class="fgp"><label>Xomashyo *</label>
            <select id="f_xoma"><option value="">tanlang</option><option>Issiq asfalt</option><option>Sovuq asfalt</option><option>Qum</option><option>Shagal</option><option>Tosh</option><option>Boshqa</option></select>
          </div>

        </div>
        <div style="overflow-x:auto">
          <table class="tbl">
            <thead><tr><th>Nakl#</th><th>Sana</th><th>Shofyor</th><th>Mashina</th><th>Xomashyo</th><th>Tonna</th><th>Reys</th><th>Joy</th><th>Summa</th><th>Hujjat</th><th>Tolandi</th><th>Amal</th></tr></thead>

<div id="rm">
  <div class="mi">
    <div class="mh"><span class="mt2">Nakladnoy Hujjati</span><button class="mc" id="mclose">X</button></div>
    <div class="ca">

<script>
window._e=[];
var U={"openroad":"asfalt2026"};
var _uid=null,_b64=null;

function v(id){return document.getElementById(id).value;}
function ld(on){document.getElementById("loader").style.display=on?"flex":"none";}
function tst(m,t){var x=document.getElementById("toast");x.textContent=m;x.className="sh "+(t||"ok");clearTimeout(x._t);x._t=setTimeout(function(){x.className="";},2800);}
function fmt(n){return Number(n).toLocaleString("uz-UZ");}
function stats(){document.getElementById("s1").textContent=window._e.length;document.getElementById("s2").textContent=window._e.reduce(function(s,e){return s+(e.tonna||0)*(e.reys||1);},0).toFixed(1);document.getElementById("s3").textContent=window._e.reduce(function(s,e){return s+(e.reys||1);},0);document.getElementById("s4").textContent=fmt(window._e.reduce(function(s,e){return s+(e.summa||0);},0));}
function dlist(){var d=[...new Set(window._e.map(function(e){return e.shofyor;}))];document.getElementById("dl").innerHTML=d.map(function(x){return"<option value='"+x+"'>";}).join("");}
function clr(){["f_nakl","f_shofyor","f_mashina","f_joy","f_izoh"].forEach(function(i){document.getElementById(i).value="";});document.getElementById("f_xoma").value="";document.getElementById("f_tonna").value="";document.getElementById("f_reys").value=1;document.getElementById("f_narx").value="";document.getElementById("f_sana").value=new Date().toISOString().split("T")[0];}
function swt(id,btn){document.querySelectorAll(".tp").forEach(function(p){p.classList.remove("ac");});document.querySelectorAll(".tb").forEach(function(b){b.classList.remove("ac");});document.getElementById("tp"+id).classList.add("ac");btn.classList.add("ac");}

function rtbl(data){
  var tb=document.getElementById("tb"),em=document.getElementById("em");
  if(!data||!data.length){tb.innerHTML="";em.style.display="block";return;}
  em.style.display="none";
  tb.innerHTML=data.map(function(e){
    var r=e.rasmB64?"<img class='rt' src='"+e.rasmB64+"' data-id='"+e.id+"' onclick='vr(this)' title='Korish'> <span class='ub' data-id='"+e.id+"' onclick='om(this)'>Edit</span>":"<span class='ub' data-id='"+e.id+"' onclick='om(this)'>+ Rasm</span>";
    return "<tr>"+"<td style='color:var(--au);font-weight:700'>"+(e.nakl||"")+"</td><td>"+(e.sana||"")+"</td><td>"+(e.shofyor||"")+"</td><td style='color:var(--au)'>"+(e.mashina||"")+"</td><td>"+(e.xoma||"")+"</td><td style='text-align:right'>"+(e.tonna||0)+"</td><td style='text-align:center'>"+(e.reys||1)+"</td><td>"+(e.joy||"-")+"</td><td style='text-align:right;font-weight:700'>"+fmt(e.summa||0)+"</td><td>"+r+"</td><td><span class='ba "+(e.tolandi?"bg":"br")+"' data-id='"+e.id+"' onclick='_pay(this.dataset.id)'>"+(e.tolandi?"Tolandi":"Yoq")+"</span></td><td><button class='db2' data-id='"+e.id+"' onclick='_del(this.dataset.id)'>X</button></td></tr>";
  }).join("");
}
function rdrvs(){
  var g=document.getElementById("dg"),em=document.getElementById("dem"),map={};
  window._e.forEach(function(e){if(!map[e.shofyor])map[e.shofyor]={m:e.mashina,r:0,t:0,s:0,pd:0,c:0};var d=map[e.shofyor];d.r+=e.reys||1;d.t+=(e.tonna||0)*(e.reys||1);d.s+=e.summa||0;if(e.tolandi)d.pd+=e.summa||0;d.c++;if(!d.m)d.m=e.mashina;});
  var ns=Object.keys(map);
  if(!ns.length){g.innerHTML="";em.style.display="block";return;}
  em.style.display="none";
  g.innerHTML=ns.map(function(n){var d=map[n],q=d.s-d.pd;return"<div class='dc'><div class='dn'>"+n+"</div><div class='dp'>"+(d.m||"-")+"</div><div class='ds'><div class='di'><div class='dv'>"+d.c+"</div><div class='dl'>Nakladnoy</div></div><div class='di'><div class='dv'>"+d.r+"</div><div class='dl'>Reys</div></div><div class='di'><div class='dv'>"+d.t.toFixed(1)+"</div><div class='dl'>Tonna</div></div></div><div class='ps'><div style='font-size:10px;color:var(--mt);margin-bottom:4px'>Jami summa</div><div style='font-family:var(--mn);font-weight:700;color:var(--au)'>"+fmt(d.s)+" som</div>"+(q>0?"<div style='font-size:11px;color:var(--rd);margin-top:4px'>Qoldiq: "+fmt(q)+" som</div>":"<div style='font-size:11px;color:var(--gr);margin-top:4px'>Toliq tolandi</div>")+"</div></div>";}).join("");
}
function om(el){_uid=el.dataset.id;_b64=null;document.getElementById("prev").style.display="none";document.getElementById("cph").style.display="flex";document.getElementById("svbtn").classList.remove("sh");document.getElementById("rm").style.display="flex";}
function vr(el){var e=window._e.find(function(x){return x.id===el.dataset.id;});if(!e||!e.rasmB64)return;document.getElementById("vi").src=e.rasmB64;document.getElementById("vdl").href=e.rasmB64;document.getElementById("vm").style.display="flex";}

// Events
document.getElementById("lbtn").addEventListener("click",function(){var l=document.getElementById("li").value.trim(),p=document.getElementById("pi2").value;if(U[l]&&U[l]===p){sessionStorage.setItem("or","1");document.getElementById("ls").style.display="none";document.getElementById("ap").style.display="block";window._startApp();}else{document.getElementById("le").style.display="block";document.getElementById("pi2").value="";}});
document.addEventListener("keydown",function(e){if(e.key==="Enter"&&document.getElementById("ls").style.display!=="none")document.getElementById("lbtn").click();});
document.getElementById("lobtn").addEventListener("click",function(){sessionStorage.removeItem("or");location.reload();});
document.getElementById("sbtn").addEventListener("click",function(){window._addE();});
document.getElementById("cbtn").addEventListener("click",function(){clr();});
document.getElementById("pbtn").addEventListener("click",function(){window.print();});
document.getElementById("csvbtn").addEventListener("click",function(){window._csv();});
document.getElementById("srch").addEventListener("input",function(){var cf=this.value.toLowerCase();rtbl(cf?window._e.filter(function(e){return JSON.stringify(e).toLowerCase().includes(cf);}):window._e);});
document.getElementById("t1").addEventListener("click",function(){swt(1,this);});
document.getElementById("t2").addEventListener("click",function(){swt(2,this);});
document.getElementById("t3").addEventListener("click",function(){swt(3,this);});
document.getElementById("mclose").addEventListener("click",function(){document.getElementById("rm").style.display="none";});
document.getElementById("vclose").addEventListener("click",function(){document.getElementById("vm").style.display="none";});
document.getElementById("cmbtn").addEventListener("click",function(){document.getElementById("fc").click();});
document.getElementById("glbtn").addEventListener("click",function(){document.getElementById("fg2").click();});
document.getElementById("svbtn").addEventListener("click",function(){if(!_b64||!_uid)return;document.getElementById("rm").style.display="none";window._saveRasm(_uid,_b64);});
["fc","fg2"].forEach(function(id){document.getElementById(id).addEventListener("change",function(){var f=this.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(ev){_b64=ev.target.result;var img=document.getElementById("prev");img.src=_b64;img.style.display="block";document.getElementById("cph").style.display="none";document.getElementById("svbtn").classList.add("sh");};rd.readAsDataURL(f);});});

if(sessionStorage.getItem("or")){document.getElementById("ls").style.display="none";document.getElementById("ap").style.display="block";window.addEventListener("load",function(){if(window._startApp)window._startApp();});}
</script>
</body>
</html>
